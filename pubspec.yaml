name: vistaratech_ar_tryon
description: "Vistara Tech AR Earring Try-On App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0
  provider: ^6.1.2
  google_mlkit_face_mesh: ^0.1.0
  o3d: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/animations/
